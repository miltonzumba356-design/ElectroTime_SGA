components:
  schemas:
    AcaoEnum:
      enum:
      - aprovar_empresa
      - rejeitar_empresa
      - suspender_empresa
      - ativar_empresa
      - visualizar_relatorio
      - exportar_dados
      - gerir_plano
      - gerir_assinatura
      - gerar_fatura
      - gerir_usuario
      - redefinir_senha
      type: string
      description: |-
        * `aprovar_empresa` - Aprovar Empresa
        * `rejeitar_empresa` - Rejeitar Empresa
        * `suspender_empresa` - Suspender Empresa
        * `ativar_empresa` - Ativar Empresa
        * `visualizar_relatorio` - Visualizar Relatório
        * `exportar_dados` - Exportar Dados
        * `gerir_plano` - Gerir Plano
        * `gerir_assinatura` - Gerir Assinatura
        * `gerar_fatura` - Gerar Fatura
        * `gerir_usuario` - Gerir Utilizador
        * `redefinir_senha` - Redefinir Senha
    Assinatura:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        uuid:
          type: string
          format: uuid
          readOnly: true
        empresa:
          type: integer
        empresa_nome:
          type: string
          readOnly: true
        plano:
          type: integer
        plano_nome:
          type: string
          readOnly: true
        status:
          $ref: '#/components/schemas/AssinaturaStatusEnum'
        status_display:
          type: string
          readOnly: true
        inicio:
          type: string
          format: date
        proximo_vencimento:
          type: string
          format: date
          nullable: true
        criado_em:
          type: string
          format: date-time
          readOnly: true
        atualizado_em:
          type: string
          format: date-time
          readOnly: true
      required:
      - atualizado_em
      - criado_em
      - empresa
      - empresa_nome
      - id
      - plano
      - plano_nome
      - status_display
      - uuid
    AssinaturaStatusEnum:
      enum:
      - trial
      - ativa
      - suspensa
      - cancelada
      type: string
      description: |-
        * `trial` - Período de Teste
        * `ativa` - Ativa
        * `suspensa` - Suspensa
        * `cancelada` - Cancelada
    ColaboradorRole:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        uuid:
          type: string
          format: uuid
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        tipo_role:
          $ref: '#/components/schemas/TipoRoleEnum'
        tipo_role_display:
          type: string
          readOnly: true
        ativo:
          type: boolean
        criado_em:
          type: string
          format: date-time
          readOnly: true
      required:
      - criado_em
      - id
      - tipo_role
      - tipo_role_display
      - user
      - uuid
    ConfiguracaoEmpresa:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        uuid:
          type: string
          format: uuid
          readOnly: true
        empresa:
          type: integer
        horario_entrada_padrao:
          type: string
          format: time
        horario_saida_padrao:
          type: string
          format: time
        horario_almoco_inicio:
          type: string
          format: time
        horario_almoco_fim:
          type: string
          format: time
        permitir_presenca_fora_geofencing:
          type: boolean
        requer_foto_entrada:
          type: boolean
        requer_foto_saida:
          type: boolean
        notificar_atraso:
          type: boolean
        notificar_ausencia:
          type: boolean
        dias_uteis:
          type: string
          description: 0=domingo, 1=segunda, ..., 6=sabado
          maxLength: 10
        criado_em:
          type: string
          format: date-time
          readOnly: true
      required:
      - criado_em
      - empresa
      - id
      - uuid
    DepartamentoEmpresa:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        uuid:
          type: string
          format: uuid
          readOnly: true
        empresa:
          type: integer
        nome:
          type: string
          maxLength: 100
        descricao:
          type: string
        responsavel:
          type: integer
          nullable: true
        responsavel_nome:
          type: string
          readOnly: true
        ativo:
          type: boolean
        criado_em:
          type: string
          format: date-time
          readOnly: true
      required:
      - criado_em
      - empresa
      - id
      - nome
      - responsavel_nome
      - uuid
    DestinoEnum:
      enum:
      - admin_empresa
      - dono_saas
