        Visão do Dono SaaS sobre qualquer utilizador (admin/colaborador/etc).

        Edição via PATCH: nome, email e is_active. A senha é alterada por endpoint
        próprio (redefinir_senha). username é read-only.
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
          title: Usuário
          description: Obrigatório. 150 caracteres ou menos. Letras, números e @/./+/-/_
            apenas.
        email:
          type: string
          format: email
          title: Endereço de email
          maxLength: 254
        first_name:
          type: string
          title: Primeiro nome
          maxLength: 150
        last_name:
          type: string
          title: Último nome
          maxLength: 150
        is_active:
          type: boolean
          title: Ativo
          description: Indica que o usuário será tratado como ativo. Ao invés de excluir
            contas de usuário, desmarque isso.
        tipo_role:
          type: string
          nullable: true
          readOnly: true
        tipo_role_display:
          type: string
          nullable: true
          readOnly: true
        empresa_id:
          type: integer
          nullable: true
          readOnly: true
        empresa_nome:
          type: string
          nullable: true
          readOnly: true
        cargo:
          type: string
          nullable: true
          readOnly: true
      required:
      - cargo
      - empresa_id
      - empresa_nome
      - id
      - tipo_role
      - tipo_role_display
      - username
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
