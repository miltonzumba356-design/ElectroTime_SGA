openapi: 3.0.3
info:
  title: Eletro Time - API de Presença
  version: 1.0.0
  description: API REST para controle de presença com geofencing
paths:
  /api/admin-saas/assinaturas/:
    get:
      operationId: admin_saas_assinaturas_list
      description: '[DONO SAAS] Gerir assinaturas das empresas.'
      parameters:
      - name: page
        required: false
        in: query
        description: Um número de página dentro do conjunto de resultados paginado.
        schema:
          type: integer
      tags:
      - '[DONO SAAS]'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAssinaturaList'
          description: ''
    post:
      operationId: admin_saas_assinaturas_create
      description: '[DONO SAAS] Gerir assinaturas das empresas.'
      tags:
      - '[DONO SAAS]'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Assinatura'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Assinatura'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Assinatura'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assinatura'
          description: ''
  /api/admin-saas/assinaturas/{id}/:
    get:
      operationId: admin_saas_assinaturas_retrieve
      description: '[DONO SAAS] Gerir assinaturas das empresas.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este assinatura.
        required: true
      tags:
      - '[DONO SAAS]'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assinatura'
          description: ''
    put:
      operationId: admin_saas_assinaturas_update
      description: '[DONO SAAS] Gerir assinaturas das empresas.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este assinatura.
        required: true
      tags:
      - '[DONO SAAS]'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Assinatura'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Assinatura'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Assinatura'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assinatura'
          description: ''
    patch:
      operationId: admin_saas_assinaturas_partial_update
      description: '[DONO SAAS] Gerir assinaturas das empresas.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este assinatura.
        required: true
      tags:
      - '[DONO SAAS]'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAssinatura'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAssinatura'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAssinatura'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assinatura'
          description: ''
    delete:
      operationId: admin_saas_assinaturas_destroy
      description: '[DONO SAAS] Gerir assinaturas das empresas.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este assinatura.
        required: true
      tags:
      - '[DONO SAAS]'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/admin-saas/assinaturas/{id}/cancelar/:
    post:
      operationId: admin_saas_assinaturas_cancelar_create
      description: Cancelar a assinatura.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este assinatura.
        required: true
      tags:
      - '[DONO SAAS]'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Assinatura'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Assinatura'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Assinatura'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assinatura'
          description: ''
  /api/admin-saas/assinaturas/{id}/gerar_fatura/:
    post:
      operationId: admin_saas_assinaturas_gerar_fatura_create
      description: Gerar uma fatura para esta assinatura (vencimento em 30 dias).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este assinatura.
        required: true
      tags:
      - '[DONO SAAS]'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Assinatura'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Assinatura'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Assinatura'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assinatura'
          description: ''
  /api/admin-saas/assinaturas/{id}/reativar/:
    post:
      operationId: admin_saas_assinaturas_reativar_create
      description: Reativar a assinatura (e ativar a empresa).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este assinatura.
        required: true
      tags:
      - '[DONO SAAS]'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Assinatura'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Assinatura'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Assinatura'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assinatura'
          description: ''
  /api/admin-saas/assinaturas/{id}/suspender/:
    post:
      operationId: admin_saas_assinaturas_suspender_create
      description: Suspender a assinatura (e desativar a empresa).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este assinatura.
        required: true
      tags:
      - '[DONO SAAS]'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Assinatura'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Assinatura'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Assinatura'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assinatura'
          description: ''
  /api/admin-saas/dashboard/:
    get:
      operationId: admin_saas_dashboard_list
      description: '[DONO SAAS] Métricas globais da plataforma.'
      tags:
      - '[DONO SAAS]'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  example:
                    empresas:
                      total: 7
                      ativas: 5
                      pendentes: 1
                      inativas: 1
                    colaboradores:
                      total: 42
                      ativos: 40
                    presencas_hoje: 35
                    assinaturas:
                      trial: 2
                      ativa: 3
                      suspensa: 1
                      cancelada: 0
                    receita:
                      mrr: 150000.0
                      faturas_pendentes: 2
                      valor_pendente: 30000.0
                      recebido_mes: 120000.0
                    crescimento_empresas:
                    - mes: 2026-01
                      novas: 1
                    - mes: 2026-02
                      novas: 2
          description: ''
  /api/admin-saas/faturas/:
    get:
      operationId: admin_saas_faturas_list
      description: '[DONO SAAS] Consultar faturas e marcar pagamento.'
      parameters:
      - name: page
        required: false
        in: query
        description: Um número de página dentro do conjunto de resultados paginado.
        schema:
          type: integer
      tags:
      - '[DONO SAAS]'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFaturaList'
          description: ''
  /api/admin-saas/faturas/{id}/:
    get:
      operationId: admin_saas_faturas_retrieve
      description: '[DONO SAAS] Consultar faturas e marcar pagamento.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este fatura.
        required: true
      tags:
      - '[DONO SAAS]'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fatura'
          description: ''
  /api/admin-saas/faturas/{id}/marcar_paga/:
    post:
      operationId: admin_saas_faturas_marcar_paga_create
      description: Marcar a fatura como paga.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este fatura.
        required: true
      tags:
      - '[DONO SAAS]'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Fatura'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Fatura'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Fatura'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fatura'
          description: ''
  /api/admin-saas/logs/:
    get:
      operationId: admin_saas_logs_list
      description: |-
        [DONO SAAS] Auditoria - Logs de ações

        Visualizar histórico de todas as ações realizadas pelo Dono SaaS.
      parameters:
      - name: page
        required: false
        in: query
        description: Um número de página dentro do conjunto de resultados paginado.
        schema:
          type: integer
      tags:
      - '[DONO SAAS] Auditoria'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLogAcaoAdminList'
          description: ''
  /api/admin-saas/logs/{id}/:
    get:
      operationId: admin_saas_logs_retrieve
      description: |-
        [DONO SAAS] Auditoria - Logs de ações

        Visualizar histórico de todas as ações realizadas pelo Dono SaaS.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este log acao admin.
        required: true
      tags:
      - '[DONO SAAS] Auditoria'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogAcaoAdmin'
          description: ''
  /api/admin-saas/logs/por_acao/:
    get:
      operationId: admin_saas_logs_por_acao_retrieve
      description: Agrupar logs por tipo de ação
      tags:
      - '[DONO SAAS] Auditoria'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                example:
                  Aprovar Empresa: 5
                  Rejeitar Empresa: 1
                  Atualizar Empresa: 3
          description: ''
  /api/admin-saas/logs/ultimos_30_dias/:
    get:
      operationId: admin_saas_logs_ultimos_30_dias_retrieve
      description: Logs dos últimos 30 dias
      tags:
      - '[DONO SAAS] Auditoria'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                example:
                - id: 1
                  acao: aprovar_empresa
                  descricao: Empresa Tech Solutions aprovada
                  empresa: Tech Solutions
                  criado_em: '2026-06-05T14:30:00Z'
          description: ''
  /api/admin-saas/planos/:
    get:
      operationId: admin_saas_planos_list
      description: '[DONO SAAS] Gerir planos de assinatura.'
      parameters:
      - name: page
        required: false
        in: query
        description: Um número de página dentro do conjunto de resultados paginado.
        schema:
          type: integer
      tags:
      - '[DONO SAAS]'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPlanoList'
          description: ''
    post:
      operationId: admin_saas_planos_create
      description: '[DONO SAAS] Gerir planos de assinatura.'
      tags:
      - '[DONO SAAS]'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Plano'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Plano'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Plano'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plano'
          description: ''
  /api/admin-saas/planos/{id}/:
    get:
      operationId: admin_saas_planos_retrieve
      description: '[DONO SAAS] Gerir planos de assinatura.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este plano.
        required: true
      tags:
      - '[DONO SAAS]'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plano'
          description: ''
    put:
      operationId: admin_saas_planos_update
      description: '[DONO SAAS] Gerir planos de assinatura.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este plano.
        required: true
      tags:
      - '[DONO SAAS]'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Plano'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Plano'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Plano'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plano'
          description: ''
    patch:
      operationId: admin_saas_planos_partial_update
      description: '[DONO SAAS] Gerir planos de assinatura.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este plano.
        required: true
      tags:
      - '[DONO SAAS]'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPlano'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPlano'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPlano'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plano'
          description: ''
    delete:
      operationId: admin_saas_planos_destroy
      description: '[DONO SAAS] Gerir planos de assinatura.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este plano.
        required: true
      tags:
      - '[DONO SAAS]'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/admin-saas/solicitacoes/:
    get:
      operationId: admin_saas_solicitacoes_list
      description: |-
        [DONO SAAS] Gerenciar solicitações de empresas

        Read-only: as solicitações são criadas automaticamente quando uma empresa
        nasce pendente. O Dono SaaS apenas lista e aprova/rejeita (ações abaixo).
      parameters:
      - name: page
        required: false
        in: query
        description: Um número de página dentro do conjunto de resultados paginado.
        schema:
          type: integer
      tags:
      - '[DONO SAAS]'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSolicitacaoEmpresaList'
          description: ''
  /api/admin-saas/solicitacoes/{id}/:
    get:
      operationId: admin_saas_solicitacoes_retrieve
      description: |-
        [DONO SAAS] Gerenciar solicitações de empresas

        Read-only: as solicitações são criadas automaticamente quando uma empresa
        nasce pendente. O Dono SaaS apenas lista e aprova/rejeita (ações abaixo).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este solicitacao empresa.
        required: true
      tags:
      - '[DONO SAAS]'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitacaoEmpresa'
          description: ''
  /api/admin-saas/solicitacoes/aprovar/:
    post:
      operationId: admin_saas_solicitacoes_aprovar_create
      description: Aprovar solicitação de empresa
      tags:
      - '[DONO SAAS]'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                solicitacao_id:
                  type: string
                  description: aceita uuid ou id
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitacaoEmpresa'
          description: ''
  /api/admin-saas/solicitacoes/pendentes/:
    get:
      operationId: admin_saas_solicitacoes_pendentes_retrieve
      description: Listar solicitações pendentes
      tags:
      - '[DONO SAAS]'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                example:
                  total: 2
                  solicitacoes:
                  - id: 1
                    nome_empresa: Tech Solutions
                    nif: '123456789'
                    email_empresa: contato@techsolutions.com
                    status: pendente
                    criado_em: '2026-06-01T10:30:00Z'
          description: ''
  /api/admin-saas/solicitacoes/rejeitar/:
    post:
      operationId: admin_saas_solicitacoes_rejeitar_create
      description: Rejeitar solicitação de empresa
      tags:
      - '[DONO SAAS]'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                solicitacao_id:
                  type: string
                  description: aceita uuid ou id
                motivo:
                  type: string
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitacaoEmpresa'
          description: ''
  /api/admin-saas/solicitacoes/resumo/:
    get:
      operationId: admin_saas_solicitacoes_resumo_retrieve
      description: Resumo geral de solicitações
      tags:
      - '[DONO SAAS]'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                example:
                  pendentes: 2
                  aprovadas: 5
                  rejeitadas: 1
                  total: 8
          description: ''
  /api/admin-saas/usuarios/:
    get:
      operationId: admin_saas_usuarios_list
      description: |-
        [DONO SAAS] Utilizadores

        Ver e editar TODOS os utilizadores (admins de empresa, colaboradores, RH...).
        Filtra por empresa e por role. Edição via PATCH (nome/email/ativo) e
        redefinição de senha por ação dedicada. Não cria nem apaga utilizadores aqui.
      parameters:
      - in: query
        name: empresa
        schema:
          type: string
        description: Filtra por empresa (aceita id ou uuid)
      - name: page
        required: false
        in: query
        description: Um número de página dentro do conjunto de resultados paginado.
        schema:
          type: integer
      - in: query
        name: role
        schema:
          type: string
        description: Filtra por tipo de role (admin, colaborador, rh, supervisor,
          ...)
      tags:
      - '[DONO SAAS]'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsuarioAdminList'
          description: ''
  /api/admin-saas/usuarios/{id}/:
    get:
      operationId: admin_saas_usuarios_retrieve
      description: |-
        [DONO SAAS] Utilizadores

        Ver e editar TODOS os utilizadores (admins de empresa, colaboradores, RH...).
        Filtra por empresa e por role. Edição via PATCH (nome/email/ativo) e
        redefinição de senha por ação dedicada. Não cria nem apaga utilizadores aqui.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Um valor inteiro único que identifica este usuário.
        required: true
      tags:
      - '[DONO SAAS]'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioAdmin'
          description: ''
    patch:
      operationId: admin_saas_usuarios_partial_update
      description: |-
        [DONO SAAS] Utilizadores

