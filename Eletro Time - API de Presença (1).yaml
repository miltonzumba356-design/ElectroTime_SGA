  /api/colaborador/fugas_de_dinheiro/:
    get:
      operationId: colaborador_fugas_de_dinheiro_retrieve
      description: |-
        Funcionalidade de EDUCAÇÃO FINANCEIRA. Pega nos pequenos gastos diários (ex: dinheiro do táxi) e mostra o impacto real ao projetá-los para o mês e para o ANO. Objetivo: consciencializar que 1.000/dia em táxi = 365.000/ano.

        FRONT — sugestão de UI:
        • Destaque a `maior_fuga` num cartão de alerta com a `dica`.
        • Tabela/lista `por_categoria` com colunas: média diária, projeção mensal, projeção anual e % do salário.
        • Mostrar `projecao_anual` total em grande (o "abre-olhos").
        • `media_diaria` por categoria → ótimo para barras comparativas.

        Notas: `dias_considerados` = dias decorridos do mês atual (ou dias do mês, se for um mês passado). Projeções = média_diária × 30 (mês) e × 365 (ano).
      summary: "Fugas de dinheiro: projeção diário → mensal → anual \U0001F695"
      parameters:
      - in: query
        name: ano
        schema:
          type: integer
        description: 'Ano (ex: 2026). Default: ano atual'
      - in: query
        name: mes
        schema:
          type: integer
        description: 'Mês (1-12). Default: mês atual'
      tags:
      - '[MOBILE COLABORADOR]'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                example:
                  mes: 6
                  ano: 2026
                  dias_considerados: 17
                  total: '34000.00'
                  media_diaria: '2000.00'
                  projecao_mensal: '60000.00'
                  projecao_anual: '730000.00'
                  maior_fuga:
                    categoria: Transporte
                    total: '17000.00'
                    media_diaria: '1000.00'
                    projecao_mensal: '30000.00'
                    projecao_anual: '365000.00'
                    percentual_salario: '8.50'
                  dica: "\U0001F695 A maior fuga é Transporte: ~1000.00/dia dá 365000.00/ano.
                    Reduzir 20% pouparia 73000.00/ano."
                  por_categoria:
                  - categoria: Transporte
                    total: '17000.00'
                    media_diaria: '1000.00'
                    projecao_mensal: '30000.00'
                    projecao_anual: '365000.00'
                    percentual_salario: '8.50'
                  - categoria: Lazer
                    total: '17000.00'
                    media_diaria: '1000.00'
                    projecao_mensal: '30000.00'
                    projecao_anual: '365000.00'
                    percentual_salario: '8.50'
          description: ''
