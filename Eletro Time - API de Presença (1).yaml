      tags:
      - '[RH] Recursos Humanos'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data_inicio:
                  type: string
                  description: Opcional (DD/MM/AAAA). Só importa competências >= esta
                data_fim:
                  type: string
                  description: Opcional (DD/MM/AAAA). Só importa competências <= esta
                folha:
                  type: array
                  items:
                    type: object
                    properties:
                      colaborador_id:
                        type: string
                        description: Obrigatório
                      mes:
                        type: integer
                        description: Obrigatório (1-12)
                      ano:
                        type: integer
                        description: 'Obrigatório (ex: 2026)'
                      salario_base:
                        type: number
                      total_subsidios:
                        type: number
                      salario_bruto:
                        type: number
                      desconto_inss:
                        type: number
                      desconto_irt:
                        type: number
                      salario_liquido:
                        type: number
                      dias_trabalhados:
                        type: integer
                      dias_falta:
                        type: integer
                    required:
                    - colaborador_id
