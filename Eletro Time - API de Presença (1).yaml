        em 'ignorados'. Senhas geradas automaticamente são devolvidas uma vez.
      summary: Importar funcionários (JSON) do ERP Primavera
      tags:
      - '[RH] Recursos Humanos'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data_inicio:
                  type: string
                  description: Opcional (DD/MM/AAAA). Só importa quem tem data_admissao
                    >= esta
                data_fim:
                  type: string
                  description: Opcional (DD/MM/AAAA). Só importa quem tem data_admissao
                    <= esta
                funcionarios:
                  type: array
                  items:
                    type: object
                    properties:
                      nome:
                        type: string
                        description: Nome completo (obrigatório)
                      email:
                        type: string
